<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <title>智能家居CPS - 仪表盘</title>
    <style>
        body {
            font-family: Arial;
            margin: 20px
        }

        .layout {
            display: grid;
            grid-template-columns: 55% 45%;
            gap: 20px;
            align-items: start
        }

        .panel {
            min-width: 0
        }

        .controls {
            margin-bottom: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center
        }

        .chart-card {
            margin-bottom: 16px
        }

        .chart-canvas {
            width: 100%;
            height: 220px
        }

        .alarm-list {
            margin-top: 10px;
            border: 1px solid #eee;
            padding: 8px;
            max-height: 160px;
            overflow: auto;
            background: #fff8f8
        }

        .energy-list {
            margin-top: 10px;
            border: 1px solid #eee;
            padding: 8px;
            max-height: 160px;
            overflow: auto;
            background: #f7fbff
        }

        .net-list {
            margin-top: 10px;
            border: 1px solid #eee;
            padding: 8px;
            max-height: 220px;
            overflow: auto;
            background: #f7fff8
        }

        table {
            border-collapse: collapse;
            width: 100%
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left
        }

        th {
            background: #f4f4f4
        }

        .cmd {
            width: 160px
        }

        .command-list {
            margin: 10px 0 0 0;
            padding: 10px;
            border: 1px dashed #bbb;
            background: #fafafa
        }

        .summary {
            margin: 10px 0;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px
        }

        .summary .card {
            border: 1px solid #eee;
            padding: 10px;
            background: #f9f9ff
        }

        .scene-bar {
            margin: 10px 0;
            display: flex;
            gap: 8px;
            flex-wrap: wrap
        }

        @media (max-width: 1100px) {
            .layout {
                grid-template-columns: 1fr
            }
        }
    </style>
</head>

<body>
    <h2>设备仪表盘</h2>
    <div class="layout">
        <div class="panel">
            <h3>设备列表</h3>
            <div id="wsStatus" style="margin:6px 0;color:#666">WebSocket: 连接中...</div>
            <div class="summary" id="summary">
                <div class="card">设备总数: -</div>
                <div class="card">在线设备: -</div>
                <div class="card">告警数量: -</div>
                <div class="card">累计能耗: -</div>
            </div>
            <div class="scene-bar">
                <button onclick="applyScene('home')">回家模式</button>
                <button onclick="applyScene('away')">离家模式</button>
                <button onclick="applyScene('night')">夜间模式</button>
                <button onclick="exportAlarms()">导出告警CSV</button>
                <button onclick="setAlarmEnabled(true)">开启告警</button>
                <button onclick="setAlarmEnabled(false)">关闭告警</button>
                <button onclick="triggerAlarm('door')">手动触发门磁告警</button>
                <button onclick="triggerAlarm('smoke')">手动触发烟雾告警</button>
            </div>
            <div class="command-list">
                <strong>命令速查</strong>
                <div>turn_on_light / turn_off_light</div>
                <div>turn_on_cooler / turn_off_cooler</div>
                <div>turn_on_plug / turn_off_plug</div>
                <div>alarm_on / alarm_off</div>
            </div>
            <table id="devs">
                <thead>
                    <tr>
                        <th>设备ID</th>
                        <th>类型</th>
                        <th>IP</th>
                        <th>最后值</th>
                        <th>最后在线</th>
                        <th>设备状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <div class="alarm-list" id="alarmList">告警：暂无</div>
        </div>
        <div class="panel">
            <h3>实时曲线（每设备一张图）</h3>
            <div class="controls">
                <label>设备：</label>
                <select id="deviceSelect"></select>
                <label>起：</label>
                <input type="datetime-local" id="startTime" />
                <label>止：</label>
                <input type="datetime-local" id="endTime" />
                <button onclick="loadHistory()">回溯</button>
                <button onclick="resetZoom()">重置缩放</button>
            </div>
            <div id="charts"></div>
            <div class="energy-list" id="energyList">能耗：暂无</div>
            <div class="net-list" id="netList">网络指标：暂无</div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
    <script>
        const charts = {}; // device_id -> {chart, data}
        const deviceState = {}; // device_id -> device info
        const COMMAND_OPTIONS = {
            light: [
                { value: 'turn_on_light', label: '开灯' },
                { value: 'turn_off_light', label: '关灯' },
                { value: 'auto_on', label: '自动控制' },
                { value: 'auto_off', label: '关闭自动' }
            ],
            temp: [
                { value: 'turn_on_cooler', label: '开启冷却' },
                { value: 'turn_off_cooler', label: '关闭冷却' },
                { value: 'auto_on', label: '自动控制' },
                { value: 'auto_off', label: '关闭自动' }
            ],
            plug: [
                { value: 'turn_on_plug', label: '打开插座' },
                { value: 'turn_off_plug', label: '关闭插座' }
            ],
            door: [
                { value: 'alarm_on', label: '开启告警' },
                { value: 'alarm_off', label: '关闭告警' }
            ],
            smoke: [
                { value: 'alarm_on', label: '开启告警' },
                { value: 'alarm_off', label: '关闭告警' }
            ]
        };

        const STATE_LABELS = {
            turn_on_light: '开启',
            turn_off_light: '关闭',
            turn_on_cooler: '开启',
            turn_off_cooler: '关闭',
            turn_on_plug: '开启',
            turn_off_plug: '关闭',
            alarm_on: '开启',
            alarm_off: '关闭',
            auto_on: '自动',
            auto_off: '手动'
        };

        function getStateLabel(cmd) {
            return STATE_LABELS[cmd] || '-';
        }

        function getDisplayState(dev) {
            if (dev.type === 'door' || dev.type === 'smoke') {
                if (typeof dev.alarm_enabled === 'boolean') {
                    return dev.alarm_enabled ? '开启' : '关闭';
                }
            }
            return getStateLabel(dev.last_cmd);
        }

        function ensureChart(devId, label) {
            if (charts[devId]) return charts[devId];
            const container = document.getElementById('charts');
            const div = document.createElement('div');
            div.className = 'chart-card';
            div.innerHTML = `<div><strong>${devId} - ${label}</strong></div><canvas id='c_${devId}' class='chart-canvas'></canvas>`;
            container.appendChild(div);
            const ctx = document.getElementById('c_' + devId).getContext('2d');
            const chart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [{ label: devId, data: [], fill: false, borderColor: 'rgb(75,192,192)' }] },
                options: {
                    animation: false,
                    scales: { x: { type: 'time', time: { unit: 'second' } } },
                    plugins: {
                        zoom: {
                            zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'x' },
                            pan: { enabled: true, mode: 'x' }
                        }
                    }
                }
            });
            charts[devId] = { chart, data: [] };
            return charts[devId];
        }

        function updateTable(devices) {
            const tbody = document.querySelector('#devs tbody');
            const selectedById = {};
            tbody.querySelectorAll('select[id^="cmd_"]').forEach(sel => {
                const devId = sel.id.replace('cmd_', '');
                selectedById[devId] = sel.value;
            });
            tbody.innerHTML = '';
            devices.forEach(d => {
                const prev = deviceState[d.device_id] || {};
                const next = { ...prev, ...d };
                if (!d.last_cmd && prev.last_cmd) {
                    next.last_cmd = prev.last_cmd;
                }
                deviceState[d.device_id] = next;
                const tr = document.createElement('tr');
                const lastSeen = next.last_seen ? new Date(next.last_seen * 1000).toLocaleTimeString() : '-';
                tr.innerHTML = `<td>${next.device_id}</td><td>${next.type}</td><td>${next.ip || '-'}</td><td>${next.last_value || '-'}</td><td>${lastSeen}</td><td>${getDisplayState(next)}</td><td><select class='cmd' id='cmd_${next.device_id}'></select><button onclick="sendCmd('${next.device_id}')">发送</button></td>`;
                const select = tr.querySelector('#cmd_' + d.device_id);
                const options = COMMAND_OPTIONS[next.type] || [];
                const placeholder = document.createElement('option');
                placeholder.value = '';
                placeholder.textContent = '请选择命令';
                placeholder.disabled = true;
                placeholder.selected = true;
                select.appendChild(placeholder);
                options.forEach(o => {
                    const opt = document.createElement('option');
                    opt.value = o.value;
                    opt.textContent = o.label;
                    select.appendChild(opt);
                });
                if (selectedById[d.device_id]) {
                    select.value = selectedById[d.device_id];
                }
                tbody.appendChild(tr);
            });
            refreshDeviceSelect();
        }

        function refreshDeviceSelect() {
            const sel = document.getElementById('deviceSelect');
            const current = sel.value;
            sel.innerHTML = '';
            Object.keys(deviceState).forEach(id => {
                const opt = document.createElement('option');
                opt.value = id;
                opt.textContent = id;
                sel.appendChild(opt);
            });
            if (current) sel.value = current;
        }

        async function sendCmd(devId) {
            const input = document.getElementById('cmd_' + devId);
            const cmd = input.value;
            if (!cmd) return alert('请选择命令');
            await fetch('/api/command', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ device_id: devId, cmd }) });
            alert('命令已下发');
            input.selectedIndex = 0;
        }

        async function applyScene(scene) {
            await fetch('/api/scene/apply', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ scene }) });
            alert('已应用场景：' + scene);
        }

        async function setAlarmEnabled(enabled) {
            const doorId = findFirstDeviceIdByType('door');
            const smokeId = findFirstDeviceIdByType('smoke');
            const cmd = enabled ? 'alarm_on' : 'alarm_off';
            const tasks = [];
            if (doorId) {
                tasks.push(fetch('/api/command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ device_id: doorId, cmd })
                }));
            }
            if (smokeId) {
                tasks.push(fetch('/api/command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ device_id: smokeId, cmd })
                }));
            }
            if (tasks.length === 0) return alert('未找到门磁/烟雾设备');
            await Promise.all(tasks);
            alert(enabled ? '已开启告警' : '已关闭告警');
        }

        function findFirstDeviceIdByType(type) {
            for (const id in deviceState) {
                if (deviceState[id] && deviceState[id].type === type) return id;
            }
            return null;
        }

        async function triggerAlarm(type) {
            const devId = findFirstDeviceIdByType(type);
            if (!devId) return alert('未找到设备类型：' + type);
            await fetch('/api/alarm/trigger', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ device_id: devId })
            });
            alert('已触发' + (type === 'door' ? '门磁' : '烟雾') + '告警');
        }

        function exportAlarms() {
            window.open('/api/alarms/export', '_blank');
        }

        function onReading(msg) {
            const devId = msg.device_id;
            const val = parseFloat(msg.value);
            if (isNaN(val)) return;
            const obj = ensureChart(devId, msg.type);
            const ch = obj.chart;
            obj.data.push({ x: new Date(msg.ts * 1000), y: val });
            if (obj.data.length > 300) obj.data.shift();
            ch.data.datasets[0].data = obj.data;
            ch.update('none');
        }

        async function loadHistory() {
            const devId = document.getElementById('deviceSelect').value;
            if (!devId) return alert('请选择设备');
            const start = document.getElementById('startTime').value;
            const end = document.getElementById('endTime').value;
            const params = new URLSearchParams({ device_id: devId, limit: '1000' });
            if (start) params.append('since', Math.floor(new Date(start).getTime() / 1000));
            if (end) params.append('until', Math.floor(new Date(end).getTime() / 1000));
            const r = await fetch('/api/history?' + params.toString());
            const data = await r.json();
            const obj = ensureChart(devId, deviceState[devId]?.type || 'sensor');
            obj.data = data.map(d => ({ x: new Date(d.ts * 1000), y: d.value }));
            obj.chart.data.datasets[0].data = obj.data;
            obj.chart.update();
        }

        function renderAlarms(list) {
            const el = document.getElementById('alarmList');
            if (!list || list.length === 0) {
                el.textContent = '告警：暂无';
                return;
            }
            const lines = list.slice(-10).reverse().map(a => {
                const t = new Date(a.ts * 1000).toLocaleTimeString();
                return `${t} [${a.level}] ${a.device_id} ${a.message}`;
            });
            el.innerHTML = '<strong>告警</strong><div>' + lines.join('<br/>') + '</div>';
        }

        function renderEnergy(list) {
            const el = document.getElementById('energyList');
            if (!list || list.length === 0) {
                el.textContent = '能耗：暂无';
                return;
            }
            const lines = list.map(e => `${e.device_id}: ${e.wh} Wh`);
            el.innerHTML = '<strong>累计能耗</strong><div>' + lines.join('<br/>') + '</div>';
        }

        function resetZoom() {
            const devId = document.getElementById('deviceSelect').value;
            if (!devId || !charts[devId]) return;
            charts[devId].chart.resetZoom();
        }

        function renderSummary(s) {
            const el = document.getElementById('summary');
            el.innerHTML = `
                <div class="card">设备总数: ${s.total_devices}</div>
                <div class="card">在线设备: ${s.online_devices}</div>
                <div class="card">告警数量: ${s.alarm_count}</div>
                <div class="card">累计能耗: ${s.energy_wh} Wh</div>
                <div class="card">平均时延: ${s.latency_ms_avg || 0} ms</div>
                <div class="card">丢包率: ${s.loss_rate || 0}%</div>
            `;
        }

        function renderNetStats(payload) {
            const el = document.getElementById('netList');
            if (!payload || !payload.devices || payload.devices.length === 0) {
                el.textContent = '网络指标：暂无';
                return;
            }
            const header = `<strong>网络指标</strong><div>总接收: ${payload.aggregate.total_rx}，总丢失: ${payload.aggregate.total_lost}，校验错误: ${payload.aggregate.total_bad_checksum}</div>`;
            const lines = payload.devices.map(d => {
                return `${d.device_id}: 延迟=${d.latency_ms_avg}ms 丢包=${d.loss_rate}% 校验错=${d.bad_checksum} 重复=${d.duplicate_packets}`;
            });
            el.innerHTML = header + '<div>' + lines.join('<br/>') + '</div>';
        }

        const wsStatus = document.getElementById('wsStatus');
        let socket = null;
        let pollingStarted = false;

        function loadScript(url) {
            return new Promise((resolve) => {
                const s = document.createElement('script');
                s.src = url;
                s.async = true;
                s.onload = () => resolve(true);
                s.onerror = () => resolve(false);
                document.head.appendChild(s);
            });
        }

        async function ensureSocketIoClient() {
            if (window.io) return true;
            // 先尝试本地，再尝试 CDN
            const candidates = [
                '/socket.io/socket.io.js',
                'https://cdn.socket.io/4.7.5/socket.io.min.js'
            ];
            for (const u of candidates) {
                const ok = await loadScript(u);
                if (ok && window.io) return true;
            }
            return false;
        }

        function startPollingFallback() {
            if (pollingStarted) return;
            pollingStarted = true;
            wsStatus.textContent = 'WebSocket: 不可用，启用轮询兜底';
            setInterval(async () => {
                try {
                    const r = await fetch('/api/devices');
                    const data = await r.json();
                    updateTable(data);
                } catch (e) {
                    // 忽略轮询错误
                }
            }, 3000);
        }

        async function initRealtime() {
            const clientOk = await ensureSocketIoClient();
            if (!clientOk || !window.io) {
                startPollingFallback();
                return;
            }

            socket = io(window.location.origin, {
                path: '/socket.io',
                transports: ['websocket'],
                reconnection: true,
                timeout: 5000
            });

            socket.on('connect', () => {
                wsStatus.textContent = 'WebSocket: 已连接';
            });
            socket.on('disconnect', () => {
                wsStatus.textContent = 'WebSocket: 已断开（将尝试重连）';
            });
            socket.on('connect_error', () => {
                wsStatus.textContent = 'WebSocket: 连接失败，启用轮询兜底';
                startPollingFallback();
            });
            socket.on('devices', data => updateTable(data));
            socket.on('reading', msg => onReading(msg));
            socket.on('alarm', msg => renderAlarms([msg]));
            socket.on('energy', msg => renderEnergy(msg));
            socket.on('netstats', msg => renderNetStats(msg));

            // 兜底：若 WebSocket 断线，轮询设备列表
            setInterval(async () => {
                if (socket && socket.connected) return;
                try {
                    const r = await fetch('/api/devices');
                    const data = await r.json();
                    updateTable(data);
                    const ar = await fetch('/api/alarms');
                    renderAlarms(await ar.json());
                    const er = await fetch('/api/energy');
                    renderEnergy(await er.json());
                    const sr = await fetch('/api/summary');
                    renderSummary(await sr.json());
                    const nr = await fetch('/api/netstats');
                    renderNetStats(await nr.json());
                } catch (e) {
                    // 忽略轮询错误
                }
            }, 3000);
        }

        initRealtime();
    </script>
</body>

</html>
